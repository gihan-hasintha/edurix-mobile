<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Timetable - Edurix</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/sub_nav_style.css">
    <link rel="stylesheet" href="./assets/css/timetable.css">
<script type="module" src="./assets/js/env.js"></script>
</head>
<body>
    <div id="navbar">
        <div class="navbar-for-application">
            <div class="navbar-for-application-content">
                <div class="navbar-for-application-content-left">
                    <div class="navbar-for-application-content-left-back" onclick="window.history.back()" style="cursor:pointer; margin-right:15px; display:flex; align-items:center; color:#fff;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </div>
                    <div class="navbar-for-application-content-left-logo">
                        <img src="./assets/img/logo.png" alt="">
                    </div><span class="nav-separator"> - </span><div id="navbar-for-application-content-left-school-name">Loading...</div><span class="nav-separator"> - </span><div id="navbar-for-application-content-left-school-name-page-name">Class Timetable</div>
                </div>
                <div class="navbar-for-application-content-righ">
                    <div class="navbar-for-application-content-righ-icons">
                        <a title="Back" onclick="history.back()">
                            <div class="navbar-for-application-content-righ-icons-for-link">
                                <img src="./assets/img/back.png" alt="">
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="navbar-space"></div>
    </div>

    <div id="main-application">
        <div class="timetable-header-wrapper">
            <div class="timetable-mobile-controls">
                <div class="controls-row-1">
                    <div class="segmented-control">
                        <button class="segment-btn active" id="btnListView" onclick="setViewMode('list')">List</button>
                        <button class="segment-btn" id="btnGridView" onclick="setViewMode('grid')">Grid</button>
                    </div>

                    <div class="week-nav">
                        <button class="btn-week-nav" onclick="navigateWeek(-1)" title="Previous Week">
                            &#10094;
                        </button>
                        <div class="date-display-wrapper" onclick="document.getElementById('weekDatePicker').showPicker()">
                            <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <input type="date" id="weekDatePicker" class="week-date-picker" title="Pick any date to jump to that week">
                        </div>
                        <button class="btn-week-nav" onclick="navigateWeek(1)" title="Next Week">
                            &#10095;
                        </button>
                    </div>

                    <button class="btn-today-jump" onclick="selectedWeekDate = new Date(); syncDatePicker(); applyFilters();">Today</button>
                </div>
                
                <div class="controls-row-2">
                    <div class="filter-dropdown full-width">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="filter-icon"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <select id="locationFilter">
                            <option value="All">All Locations</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="timetable-container">
            <div id="loader" class="loading-spinner">
                <p>Loading timetable...</p>
            </div>
            <div id="errorMessage" class="error-message hidden">
                Failed to load classes. Please check your connection.
            </div>
            <div class="timetable-grid" id="timetableGrid">
                <!-- Columns for days will be injected here -->
            </div>
        </div>
    </div>

    <script type="module" src="./assets/js/application_config.js"></script>
    <script type="module" src="./assets/js/timetable.js"></script>
</body>
</html>
